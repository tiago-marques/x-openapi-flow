name: Publish to npm (Token)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: x-openapi-flow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Package version ($PKG_VERSION) does not match release tag ($TAG_VERSION)."
            exit 1
          fi

      - name: Validate npm token
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Missing npm token secret. Configure NPM_TOKEN (preferred) or GH_PACKAGES_TOKEN (legacy)."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GH_PACKAGES_TOKEN }}

      - name: Publish to npm using token
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GH_PACKAGES_TOKEN }}
