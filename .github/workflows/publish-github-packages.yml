name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Optional GitHub Environment for isolated secrets/approvals
    environment: github-packages-v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@tiago-marques'

      - name: Install dependencies
        working-directory: x-openapi-flow
        run: npm ci

      - name: Run tests
        working-directory: x-openapi-flow
        run: npm test

      - name: Sync package README
        working-directory: x-openapi-flow
        run: npm run sync:readme

      - name: Verify package tarball includes README
        working-directory: x-openapi-flow
        run: |
          node -e "const { execSync } = require('node:child_process'); const out = execSync('npm pack --dry-run --json', { encoding: 'utf8' }); const payload = JSON.parse(out); const files = ((payload[0] && payload[0].files) || []).map((file) => file.path); if (!files.includes('README.md')) { console.error('README.md is missing from npm pack output.'); process.exit(1); } console.log('README.md found in npm pack output.');"

      - name: Prepare scoped name for GitHub Packages mirror
        working-directory: x-openapi-flow
        run: npm pkg set name=@tiago-marques/x-openapi-flow

      - name: Validate GitHub Packages token (v2)
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Missing GH_PACKAGES_TOKEN_V2 secret."
            echo "Set it at repo Secrets or Environment 'github-packages-v2'."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN_V2 }}

      - name: Publish to GitHub Packages (v2 token)
        working-directory: x-openapi-flow
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN_V2 }}
