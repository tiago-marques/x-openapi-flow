name: x-openapi-flow validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: x-openapi-flow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: x-openapi-flow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Sync package README
        run: npm run sync:readme

      - name: Verify package tarball includes README
        run: |
          node -e "const { execSync } = require('node:child_process'); const out = execSync('npm pack --dry-run --json', { encoding: 'utf8' }); const jsonStart = out.indexOf('['); if (jsonStart === -1) { console.error('Could not find JSON payload in npm pack output.'); process.exit(1); } const payload = JSON.parse(out.slice(jsonStart)); const files = ((payload[0] && payload[0].files) || []).map((file) => file.path); if (!files.includes('README.md')) { console.error('README.md is missing from npm pack output.'); process.exit(1); } console.log('README.md found in npm pack output.');"

      - name: Validate x-openapi-flow examples
        run: |
          node bin/x-openapi-flow.js validate examples/payment-api.yaml --profile strict --strict-quality
          node bin/x-openapi-flow.js validate examples/order-api.yaml --profile strict --strict-quality
          node bin/x-openapi-flow.js validate examples/ticket-api.yaml --profile strict --strict-quality
          node bin/x-openapi-flow.js validate examples/quality-warning-api.yaml --profile strict

      - name: Validate via official reusable GitHub Action (smoke)
        uses: ./
        with:
          openapi-file: examples/order-api.yaml
          profile: strict
          strict-quality: "true"
          working-directory: x-openapi-flow

      - name: Assert non-terminating example fails in strict profile
        run: |
          if node bin/x-openapi-flow.js validate examples/non-terminating-api.yaml --profile strict; then
            echo "Expected non-terminating-api.yaml to fail in strict profile, but it passed."
            exit 1
          fi

  runtime-enforcement:
    name: runtime-enforcement
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: x-openapi-flow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: x-openapi-flow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime guard unit tests
        run: npm run test:runtime

      - name: Validate runtime guard integration examples
        run: node --test tests/integration/runtime-guard-examples.test.js
